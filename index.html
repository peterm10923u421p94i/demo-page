<!DOCTYPE html>
<html>
<head>
    <title>My Styled GitHub Page</title>
    <style>
        /* This is the CSS section! */
        
        body {
            background-color: lavender; /* A light blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333; /* Dark grey text is easier to read than pure black */
            line-height: 1.6; /* Adds space between lines of text */
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers everything horizontally */
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px; /* Gives those trendy rounded corners */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Adds a subtle shadow */
        }

        h1 {
            color: #2c3e50; /* A nice deep navy blue */
            text-align: center;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Styled Page!</h1>
        <p>I just learned how to use CSS. Now my website doesn't look like a document from 1995!</p>
        <p>I can change colors, fonts, and even add shadows to make things pop.</p>
        <img src="v2osk-1Z2niiBPg5A-unsplash (1).jpg" alt="A description of my image for screen readers" class="profile-img">

<style>
    .profile-img {
        width: 100%;       /* Makes it fill the container */
        max-width: 400px;  /* Prevents it from getting too huge */
        height: auto;      /* Keeps the proportions correct */
        border-radius: 10px;
        margin-top: 20px;
    }
</style>
        <p>Check out my favorite resource for learning more: 
    <a href="https://www.wikipedia.org" target="_blank" rel="noopener noreferrer">Visit Wikipedia</a>
</p>
    </div>

</body>
</html>
