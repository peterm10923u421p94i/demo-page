<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Styled GitHub Page</title>
    <style>
        /* BASE STYLES */
        body {
            background-color: lavender; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the container */
        }

        /* THE WHITE CARD */
        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Slightly deeper shadow */
            text-align: center; /* Centers text and images inside */
        }

        /* TEXT STYLING */
        h1 {
            color: #2c3e50;
            margin-top: 0; /* Removes extra space at the top */
        }

        p {
            font-size: 18px;
            margin-bottom: 20px; /* Gives the text room to breathe */
        }

        /* IMAGE STYLING */
        .profile-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* LINK BUTTON STYLING */
        .btn {
            display: inline-block;
            background-color: #2c3e50;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            background-color: #34495e;
            transform: scale(1.05); /* Makes the button slightly grow on hover */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Styled Page!</h1>
        
        <p>I just learned how to use CSS. Now my website doesn't look like a document from 1995!</p>
        
        <img src="landscape.jpg" alt="A beautiful landscape from Unsplash" class="profile-img">

        <p>I can change colors, fonts, and even add shadows to make things pop.</p>
        
        <a href="https://www.wikipedia.org" target="_blank" rel="noopener noreferrer" class="btn">
            Visit Wikipedia
        </a>
    </div>

</body>
</html>
